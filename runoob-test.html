<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" type="text/css">
</head>

<body>
  <div class="digital-clock">
    <i class="fas fa-ellipsis-v uil uil-ellipsis-v dot-menu-btn" style="color:#fff" id="active-menu"></i>
    <ul class="dot-menu" id="active-menu">
      <li class="menu-item" id="active-menu">
        <span class="clock-format-text" id="active-menu">24小时制</span>
        <div class="format-switch-btn" id="active-menu" date-format="12"></div>
      </li>
    </ul>
    <div class="time">
      <span class="hours">00</span>
      <span class="dots">:</span>
      <span class="minutes">00</span>
      <div class="right-side">
        <span class="period">AM/PM</span>
        <span class="seconds">00</span>
      </div>
    </div>
    <div class="calender">
      <span class="month-name">Month</span>,
      <span class="day-name">Day</span>
      <span class="day-num">00</span>
    </div>
  </div>

  <div class="return-container">
  <a href="./index.html" class="return-button">返回</a>
</div>

<style>
    /* ===== 基础 ===== */
    * {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('./image/background.webp') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      isolation: isolate;
    }

    /* 背景柔化蒙层 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.04);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 时钟容器 — 毛玻璃 ===== */
    .digital-clock {
      position: relative;
      z-index: 2;
      color: #fff;
      background: rgba(15, 15, 25, 0.32);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: clamp(340px, 55vw, 680px);
      padding: clamp(32px, 5vw, 56px) clamp(32px, 6vw, 64px);
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      box-shadow: 0 12px 56px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* 发光边框光晕 — 柔和版 */
    .digital-clock::before {
      content: '';
      position: absolute;
      background: linear-gradient(45deg, #24ff6d, #2f93f1, #ff5e9a, #c084fc);
      background-size: 300% 300%;
      top: -3px;
      left: -3px;
      bottom: -3px;
      right: -3px;
      z-index: -1;
      border-radius: 26px;
      filter: blur(24px);
      opacity: 0.3;
      animation: glowing 8s ease infinite;
    }

    @keyframes glowing {
      0%   { background-position: 0 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0 50%; }
    }

    /* ===== 时间数字 ===== */
    .time {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hours, .dots, .minutes {
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      padding: 0 clamp(6px, 1.5vw, 12px);
      line-height: 1.1;
    }

    .hours, .minutes {
      font-size: clamp(4em, 10vw, 8em);
      width: auto;
    }

    .dots {
      font-size: clamp(2.6em, 7vw, 5em);
      color: rgba(255, 255, 255, 0.25);
    }

    .hours {
      background: linear-gradient(180deg, #a78bfa, #67e8f9);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    .minutes {
      background: linear-gradient(180deg, #f472b6, #fbbf24);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    .right-side {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin-left: clamp(6px, 1.5vw, 12px);
    }

    .period, .seconds {
      font-size: clamp(0.95em, 2.2vw, 1.4em);
      font-weight: 500;
    }

    .period {
      transform: translateY(-0.5em);
      background: linear-gradient(180deg, #fbbf24, #fde68a);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    .seconds {
      transform: translateY(0.4em);
      background: linear-gradient(180deg, #67e8f9, #a78bfa);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* ===== 日历 ===== */
    .calender {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(1em, 2.5vw, 1.4em);
      font-weight: 500;
      margin-top: clamp(8px, 2vh, 20px);
      background: linear-gradient(135deg, #c084fc, #f472b6);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0.85;
    }

    .month-name, .day-name, .day-num {
      margin-left: 0.35em;
    }

    /* ===== 菜单图标 ===== */
    .dot-menu-btn {
      position: absolute;
      top: 0;
      right: 0;
      margin: clamp(10px, 2vw, 18px);
      color: rgba(255, 255, 255, 0.45);
      font-size: clamp(1.1em, 2vw, 1.4em);
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 3;
    }

    .dot-menu-btn:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    /* ===== 下拉菜单 — 毛玻璃 ===== */
    .dot-menu {
      z-index: 999;
      position: absolute;
      top: 6px;
      right: 6px;
      list-style: none;
      background: rgba(20, 20, 35, 0.78);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: clamp(10px, 1.5vw, 14px) clamp(14px, 2vw, 20px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      visibility: hidden;
      opacity: 0;
      transition: 0.3s ease;
    }

    .dot-menu.active {
      visibility: visible;
      opacity: 1;
    }

    .menu-item {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .clock-format-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85em;
      margin-right: 16px;
    }

    .format-switch-btn {
      width: 36px;
      height: 18px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 75px;
      cursor: pointer;
      display: flex;
      align-items: center;
      position: relative;
      transition: background 0.3s ease;
    }

    .format-switch-btn::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #f472b6;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(244, 114, 182, 0.4);
      left: 2px;
      transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.15);
    }

    .format-switch-btn.active::before {
      background: #67e8f9;
      box-shadow: 0 2px 8px rgba(103, 232, 249, 0.4);
      transform: translateX(18px);
    }

    /* ===== 返回按钮 — 毛玻璃 ===== */
    .return-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 3;
    }

    .return-button {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(6px) saturate(1.05);
      -webkit-backdrop-filter: blur(6px) saturate(1.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.95em;
      font-weight: 600;
      border-radius: 14px;
      transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.1);
      cursor: pointer;
    }

    .return-button:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .return-button:active {
      transform: translateY(-1px) scale(0.97);
      transition: all 0.1s ease;
    }

    /* ===== 响应式 ===== */
    @media screen and (max-width: 600px) {
      .digital-clock {
        width: 92vw;
        padding: 28px 18px 22px;
        border-radius: 18px;
        backdrop-filter: blur(14px) saturate(1.3);
        -webkit-backdrop-filter: blur(14px) saturate(1.3);
      }

      .digital-clock::before {
        border-radius: 20px;
        filter: blur(18px);
        opacity: 0.25;
      }

      .hours, .minutes {
        font-size: clamp(3.5em, 18vw, 5em);
      }

      .dots {
        font-size: clamp(2.2em, 12vw, 3.2em);
      }

      .period, .seconds {
        font-size: 0.95em;
      }

      .calender {
        font-size: 1em;
      }

      .return-container {
        bottom: 16px;
        right: 16px;
      }

      .return-button {
        padding: 10px 18px;
        font-size: 0.85em;
        border-radius: 12px;
      }
    }

    @media screen and (max-width: 380px) {
      .digital-clock {
        padding: 22px 14px 18px;
        border-radius: 16px;
      }

      .digital-clock::before {
        border-radius: 18px;
      }

      .hours, .minutes {
        font-size: clamp(2.8em, 16vw, 4em);
      }

      .dots {
        font-size: clamp(1.8em, 10vw, 2.5em);
      }

      .period, .seconds {
        font-size: 0.82em;
      }

      .calender {
        font-size: 0.9em;
      }
    }
  </style>

  <script>
    // js for switch clock format
    const formatSwitchBtn = document.querySelector(".format-switch-btn");

    formatSwitchBtn.addEventListener("click", () => {
      formatSwitchBtn.classList.toggle("active");

      var formatValue = formatSwitchBtn.getAttribute("date-format");

      if (formatValue === "12") {
        formatSwitchBtn.setAttribute("date-format", "24");
      } else {
        formatSwitchBtn.setAttribute("date-format", "12");
      }
    });

    // Get Current Time In Javascript
    function clock() {
      var today = new Date();

      var hours = today.getHours();
      var minutes = today.getMinutes();
      var seconds = today.getSeconds();
      let period = "AM";

      // set the time period
      if (hours >= 12) {
        period = "PM";
      }

      // set 12 hour clock format
      var formatValue = formatSwitchBtn.getAttribute("date-format");

      if (formatValue === "12") {
        hours = hours > 12 ? hours % 12 : hours;
      }

      // add 0 for the value lower than 10
      if (hours < 10) {
        hours = "0" + hours;
      }

      if (minutes < 10) {
        minutes = "0" + minutes;
      }

      if (seconds < 10) {
        seconds = "0" + seconds;
      }

      document.querySelector(".hours").innerHTML = hours;
      document.querySelector(".minutes").innerHTML = minutes;
      document.querySelector(".period").innerHTML = period;
      document.querySelector(".seconds").innerHTML = seconds;
    }
    var updateClock = setInterval(clock, 1000);

    // get the date in js
    var today = new Date();
    const dayNum = today.getDate();
    const year = today.getFullYear();
    const dayName = today.toLocaleString("default", { weekday: "long" });
    const monthName = today.toLocaleString("default", { month: "short" });

    document.querySelector(".month-name").innerHTML = monthName;
    document.querySelector(".day-name").innerHTML = dayName;
    document.querySelector(".day-num").innerHTML = dayNum;
    // document.querySelector(".year").innerHTML = year;

    // js for dot menu toggle
    const dotmenuBtn = document.querySelector(".dot-menu-btn");
    const dotMenu = document.querySelector(".dot-menu");
    dotmenuBtn.addEventListener("click", () => {
      dotMenu.classList.toggle("active");
    });

    document.addEventListener("click", (e) => {
      if (e.target.id !== "active-menu") {
        dotMenu.classList.remove("active");
      }
    });
  </script>
</body>

</html>
